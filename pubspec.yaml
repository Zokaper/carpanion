name: car_dashboard
description: A high-performance Flutter dashboard app for car environments.
version: 1.0.0+1
publish_to: 'none'

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  geolocator: ^14.0.2
  android_intent_plus: ^6.0.0
  provider: ^6.1.5
  http: ^1.2.0
  shared_preferences: ^2.2.3
  flutter_media_controller: ^1.0.3
  flutter_contacts: ^2.2.1
  call_log: ^6.0.1
  url_launcher: ^6.2.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
