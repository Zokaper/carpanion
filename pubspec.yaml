name: car_dashboard
description: A high-performance Flutter dashboard app for car environments.
version: 1.0.0+1
publish_to: 'none'

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  geolocator: ^14.0.2
  android_intent_plus: ^6.0.0
  provider: ^6.1.5
  http: ^1.2.0
  shared_preferences: ^2.2.3
  flutter_media_controller: ^1.0.3
  flutter_contacts: ^2.1.0
  call_log: ^6.0.1
  url_launcher: ^6.2.5
  share_handler: ^0.0.21
  socket_io_client: ^2.0.3
  google_sign_in: ^6.2.1
  googleapis: ^11.4.0
  googleapis_auth: ^1.4.1
  qr_flutter: ^4.1.0
  extension_google_sign_in_as_googleapis_auth: ^2.0.12
  flutter_secure_storage: ^10.3.1
  crypto: ^3.0.7
  webview_flutter: ^4.14.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
